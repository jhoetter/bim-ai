services:
  postgres:
    image: postgres:16-alpine
    container_name: bimai-postgres
    environment:
      POSTGRES_DB: bimai
      POSTGRES_USER: bimai
      POSTGRES_PASSWORD: bimai
    ports:
      - '5545:5432'
    volumes:
      - bimai_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bimai -d bimai']
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: bimai-redis
    ports:
      - '6392:6379'
    volumes:
      - bimai_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: bimai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bimai
      MINIO_ROOT_PASSWORD: bimai-dev-password
    ports:
      - '9120:9000'
      - '9121:9001'
    volumes:
      - bimai_minio:/data
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  bimai_postgres:
  bimai_redis:
  bimai_minio:
